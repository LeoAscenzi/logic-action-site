events {}

http {
	server {
		listen 80;
		server_name api.ivybridgesociety.com metabase.ivybridgesociety.com;

		location /.well-known/acme-challenge/ {
			root /var/www/certbot;
		}

		location / {
			return 301 https://$host$request_uri;
		}
	}

	server {
		listen 443 ssl;
		server_name api.ivybridgesociety.com;

		ssl_certificate /etc/letsencrypt/live/api.ivybridgesociety.com/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/api.ivybridgesociety.com/privkey.pem;

		client_max_body_size 20M;

		location / {
			proxy_pass http://api:8000;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}
	}

	server {
		listen 443 ssl;
		server_name metabase.ivybridgesociety.com;

		ssl_certificate /etc/letsencrypt/live/metabase.ivybridgesociety.com/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/metabase.ivybridgesociety.com/privkey.pem;

		location / {
			proxy_pass http://metabase:3000;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
		}
	}
}
