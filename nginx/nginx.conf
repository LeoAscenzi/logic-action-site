events {}

http {
	# Rate limit zones — stored in 10MB shared memory
	limit_req_zone $binary_remote_addr zone=api:10m   rate=60r/m;   # 1 req/sec per IP
	limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;    # brute-force guard

	server {
		listen 80;
		server_name api.ivybridgesociety.com;

		location /.well-known/acme-challenge/ {
			root /var/www/certbot;
		}

		location / {
			return 301 https://$host$request_uri;
		}
	}

	server {
		listen 443 ssl;
		server_name api.ivybridgesociety.com;

		ssl_certificate /etc/letsencrypt/live/api.ivybridgesociety.com/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/api.ivybridgesociety.com/privkey.pem;

		client_max_body_size 20M;

		# Drop connections to scanner bait paths — no response, no info leaked
		location ~* ^/(metrics|\.env|\.git|wp-admin|phpinfo|actuator|telescope|\.php) {
			return 444;
		}

		# Tight rate limit on auth endpoints (login, register, refresh)
		location ~* ^/(login|register|refresh) {
			limit_req zone=login burst=3 nodelay;
			limit_req_status 429;

			proxy_pass http://api:8000;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		# General API — allow short bursts (20), then enforce 1 req/sec
		location / {
			limit_req zone=api burst=20 nodelay;
			limit_req_status 429;

			proxy_pass http://api:8000;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}
	}
}
