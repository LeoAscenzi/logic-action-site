services:
  api:
    image: ivy-bridge-api:latest
    restart: unless-stopped
    env_file:
      - ./backend/.env
    expose:
      - "8000"
    networks:
      - internal

  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_ANALYTICS_TRACKING: "false"
      MB_SITE_NAME: "Ivy Bridge"
      MB_SITE_URL: "https://metabase.ivybridgesociety.com"
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - metabase
    networks:
      - internal

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  metabase_data:

networks:
  internal:
